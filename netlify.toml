[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Cache-Control           = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from   = "/ar"
  to     = "/ar/"
  status = 301

[[redirects]]
  from   = "/topics/:topic"
  to     = "/topics/:topic/"
  status = 301
