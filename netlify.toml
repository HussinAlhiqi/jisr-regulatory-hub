[build]
  publish = "public"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Clean URLs — /leave works without .html
[[redirects]]
  from = "/leave"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/hiring"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/pay"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/termination"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/worker-types"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/compliance"
  to = "/index.html"
  status = 200
